<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPD Incident Tracker</title>
  
  <style>
    :root {
      --bg: #0b0e18;
      --bg2: #111827;
      --bg3: #1a2236;
      --text: #edf0fa;
      --text2: #9da8c4;
      --text3: #606880;
      --border: rgba(255,255,255,0.12);
      --accent: #2979e8;
      --green: #22c55e;
      --red: #ef4444;
      --font: 'Courier New', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
    }

    .screen {
      display: none;
      width: 100%;
      height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .screen.active {
      display: flex;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      max-width: 400px;
      width: 100%;
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo-icon {
      font-size: 60px;
      margin-bottom: 10px;
    }

    .logo-title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text);
    }

    .logo-subtitle {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 8px;
    }

    .form-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .form-group label {
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .form-group input {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 14px;
      border-radius: 6px;
      font-family: var(--font);
      font-size: 14px;
      transition: all 0.15s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      background: #1a2236;
    }

    .button-group {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 10px;
    }

    .btn {
      padding: 14px 20px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text2);
      border-radius: 6px;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .btn:hover {
      background: #1f2d3d;
      border-color: var(--accent);
      color: var(--text);
    }

    .btn.primary {
      background: rgba(41, 121, 232, 0.15);
      border-color: var(--accent);
      color: var(--accent);
      grid-column: 1 / -1;
      padding: 16px;
      font-size: 13px;
    }

    .btn.primary:hover {
      background: rgba(41, 121, 232, 0.25);
      color: #fff;
    }

    .error-msg {
      color: var(--red);
      font-size: 12px;
      text-align: center;
      min-height: 20px;
    }

    .version {
      font-size: 10px;
      color: var(--text3);
      margin-top: 20px;
      text-align: center;
    }
  </style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div class="screen active" id="login-screen">
  <div class="container">
    <div class="logo">
      <div class="logo-icon">🛡️</div>
      <div class="logo-title">INCIDENT<br>TRACKER</div>
      <div class="logo-subtitle">Shrewsbury Police Department</div>
    </div>

    <div class="form-group" style="width: 100%;">
      <div>
        <label>Username</label>
        <input id="username" type="text" placeholder="Enter username" autocomplete="off">
      </div>

      <div>
        <label>Password</label>
        <input id="password" type="password" placeholder="Enter password" autocomplete="off">
      </div>

      <div class="error-msg" id="error"></div>

      <div class="button-group">
        <button class="btn" onclick="loginAdmin()">Admin</button>
        <button class="btn" onclick="loginIC()">IC</button>
      </div>
    </div>

    <div class="version">v1.0 | Real-Time GPS Tracking</div>
  </div>
</div>

<!-- ADMIN SCREEN -->
<div class="screen" id="admin-screen">
  <div style="width: 100%; max-width: 700px; padding: 20px;">
    <!-- Header -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
      <div>
        <h1 style="font-size: 24px; font-weight: 700;">ADMIN</h1>
        <div style="font-size: 11px; color: var(--text3); margin-top: 4px;" id="admin-user">Logged in as: --</div>
      </div>
      <button class="btn" onclick="logout()">LOGOUT</button>
    </div>

    <!-- Tabs -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 25px;">
      <button class="admin-tab-btn active" onclick="adminShowTab('ics')" style="padding: 12px; background: rgba(41, 121, 232, 0.15); border: 1px solid var(--accent); color: var(--accent); border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer;">IC Accounts</button>
      <button class="admin-tab-btn" onclick="adminShowTab('admins')" style="padding: 12px; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer;">Admin Accounts</button>
    </div>

    <!-- IC ACCOUNTS TAB -->
    <div id="admin-tab-ics" class="admin-tab-content" style="display: block;">
      <!-- Create IC Form -->
      <div style="background: var(--bg3); border: 1px solid var(--border); padding: 15px; border-radius: 6px; margin-bottom: 20px;">
        <div style="font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; font-weight: 700;">Create New IC Account</div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
          <input id="new-ic-username" type="text" placeholder="Username" style="background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 4px; font-family: var(--font); font-size: 12px;">
          <input id="new-ic-password" type="password" placeholder="Password" style="background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 4px; font-family: var(--font); font-size: 12px;">
        </div>

        <button class="btn primary" onclick="adminCreateIC()" style="width: 100%; padding: 10px; font-size: 11px;">+ CREATE IC ACCOUNT</button>
      </div>

      <!-- IC Accounts List -->
      <div style="font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; font-weight: 700;">Existing IC Accounts</div>
      <div id="admin-ics-list" style="display: flex; flex-direction: column; gap: 10px;">
        <div style="text-align: center; color: var(--text3); padding: 20px;">Loading...</div>
      </div>
    </div>

    <!-- ADMIN ACCOUNTS TAB -->
    <div id="admin-tab-admins" class="admin-tab-content" style="display: none;">
      <!-- Create Admin Form -->
      <div style="background: var(--bg3); border: 1px solid var(--border); padding: 15px; border-radius: 6px; margin-bottom: 20px;">
        <div style="font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; font-weight: 700;">Create New Admin Account</div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
          <input id="new-admin-username" type="text" placeholder="Username" style="background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 4px; font-family: var(--font); font-size: 12px;">
          <input id="new-admin-password" type="password" placeholder="Password" style="background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 4px; font-family: var(--font); font-size: 12px;">
        </div>

        <button class="btn primary" onclick="adminCreateAdmin()" style="width: 100%; padding: 10px; font-size: 11px;">+ CREATE ADMIN ACCOUNT</button>
      </div>

      <!-- Admin Accounts List -->
      <div style="font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; font-weight: 700;">Existing Admin Accounts</div>
      <div id="admin-admins-list" style="display: flex; flex-direction: column; gap: 10px;">
        <div style="text-align: center; color: var(--text3); padding: 20px;">Loading...</div>
      </div>
    </div>

    <!-- Error/Success Message -->
    <div class="error-msg" id="admin-message" style="margin-top: 20px;"></div>
  </div>

  <!-- EDIT MODAL -->
  <div id="edit-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; flex-direction: column; align-items: center; justify-content: center;">
    <div style="background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 30px; max-width: 400px; width: 100%;">
      <h2 style="margin-bottom: 20px;">Edit Account</h2>
      
      <div style="margin-bottom: 15px;">
        <label style="font-size: 10px; color: var(--text3); text-transform: uppercase; display: block; margin-bottom: 4px;">Username</label>
        <input id="edit-username" type="text" style="width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 4px; font-family: var(--font); font-size: 12px;">
      </div>

      <div style="margin-bottom: 15px;">
        <label style="font-size: 10px; color: var(--text3); text-transform: uppercase; display: block; margin-bottom: 4px;">New Password (leave blank to keep)</label>
        <input id="edit-password" type="password" placeholder="Leave blank to keep current password" style="width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 4px; font-family: var(--font); font-size: 12px;">
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button class="btn primary" onclick="adminSaveEdit()" style="padding: 10px; font-size: 11px;">SAVE</button>
        <button class="btn" onclick="adminCloseModal()" style="padding: 10px; font-size: 11px;">CANCEL</button>
      </div>
    </div>
  </div>
</div>

<!-- IC SCREEN (PLACEHOLDER) -->
<div class="screen" id="ic-screen">
  <div class="container">
    <h1>IC DASHBOARD</h1>
    <button class="btn primary" onclick="logout()">LOGOUT</button>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyC-56rq9DEw2U0XJ37O8rujeO6O4zAphXE",
  authDomain: "shrewsbury-pd-track.firebaseapp.com",
  databaseURL: "https://shrewsbury-pd-track-default-rtdb.firebaseio.com",
  projectId: "shrewsbury-pd-track",
  storageBucket: "shrewsbury-pd-track.firebasestorage.app",
  messagingSenderId: "183303387326",
  appId: "1:183303387326:web:09b8659a1004aa42bbc6ef"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// State
let currentUser = null;
let userRole = null;

// Show error
function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  setTimeout(() => el.textContent = '', 3000);
}

// Show screen
function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
}

// Login as Admin
async function loginAdmin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!username || !password) {
    showError('Enter username and password');
    return;
  }

  // Check hardcoded admin
  if (username === 'admin' && password === '1234') {
    currentUser = username;
    userRole = 'admin';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    document.getElementById('admin-user').textContent = 'Logged in as: ' + username;
    showScreen('admin-screen');
    adminLoadICs();
    return;
  }

  showError('Invalid credentials');
}

// Login as IC
async function loginIC() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!username || !password) {
    showError('Enter username and password');
    return;
  }

  try {
    const snap = await db.ref('ics/' + username).once('value');
    const ic = snap.val();
    if (ic && ic.password === password) {
      currentUser = username;
      userRole = 'ic';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      showScreen('ic-screen');
      return;
    }
  } catch (err) {
    console.error('Firebase error:', err);
  }

  showError('Invalid credentials');
}

// Logout
function logout() {
  currentUser = null;
  userRole = null;
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
  showScreen('login-screen');
}

// Allow Enter key
document.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    if (document.getElementById('login-screen').classList.contains('active')) {
      loginAdmin();
    }
  }
});

// ===== ADMIN FUNCTIONS =====

let adminEditingAccount = null;
let adminEditingType = null;

function adminShowTab(tab) {
  document.querySelectorAll('.admin-tab-content').forEach(t => t.style.display = 'none');
  document.querySelectorAll('.admin-tab-btn').forEach(b => {
    b.style.background = 'var(--bg3)';
    b.style.borderColor = 'var(--border)';
    b.style.color = 'var(--text2)';
  });
  
  document.getElementById('admin-tab-' + tab).style.display = 'block';
  event.target.style.background = 'rgba(41, 121, 232, 0.15)';
  event.target.style.borderColor = 'var(--accent)';
  event.target.style.color = 'var(--accent)';
  
  if (tab === 'ics') adminLoadICs();
  if (tab === 'admins') adminLoadAdmins();
}

function adminShowMessage(msg, isError = false) {
  const el = document.getElementById('admin-message');
  el.textContent = msg;
  el.style.color = isError ? 'var(--red)' : 'var(--green)';
  setTimeout(() => el.textContent = '', 3000);
}

async function adminCreateIC() {
  const username = document.getElementById('new-ic-username').value.trim();
  const password = document.getElementById('new-ic-password').value.trim();

  if (!username || !password) {
    adminShowMessage('❌ Enter username and password', true);
    return;
  }

  if (password.length < 6) {
    adminShowMessage('❌ Password must be at least 6 characters', true);
    return;
  }

  try {
    await db.ref('ics/' + username).set({
      username,
      password,
      createdAt: new Date().toISOString()
    });

    adminShowMessage('✓ IC account created: ' + username);
    document.getElementById('new-ic-username').value = '';
    document.getElementById('new-ic-password').value = '';
    adminLoadICs();
  } catch (err) {
    adminShowMessage('❌ Error: ' + err.message, true);
  }
}

async function adminCreateAdmin() {
  const username = document.getElementById('new-admin-username').value.trim();
  const password = document.getElementById('new-admin-password').value.trim();

  if (!username || !password) {
    adminShowMessage('❌ Enter username and password', true);
    return;
  }

  if (password.length < 6) {
    adminShowMessage('❌ Password must be at least 6 characters', true);
    return;
  }

  try {
    await db.ref('admins/' + username).set({
      username,
      password,
      createdAt: new Date().toISOString()
    });

    adminShowMessage('✓ Admin account created: ' + username);
    document.getElementById('new-admin-username').value = '';
    document.getElementById('new-admin-password').value = '';
    adminLoadAdmins();
  } catch (err) {
    adminShowMessage('❌ Error: ' + err.message, true);
  }
}

async function adminLoadICs() {
  try {
    const snap = await db.ref('ics').once('value');
    const ics = snap.val() || {};
    const list = document.getElementById('admin-ics-list');

    if (Object.keys(ics).length === 0) {
      list.innerHTML = '<div style="text-align: center; color: var(--text3); padding: 20px;">No IC accounts</div>';
      return;
    }

    list.innerHTML = Object.entries(ics)
      .map(([username, data]) => `
        <div style="background: var(--bg3); border: 1px solid var(--border); padding: 12px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;">
          <div>
            <div style="font-weight: 700; color: var(--text);">${username}</div>
            <div style="font-size: 9px; color: var(--text3); margin-top: 2px;">Created: ${new Date(data.createdAt).toLocaleDateString()}</div>
          </div>
          <div style="display: flex; gap: 6px;">
            <button class="btn" onclick="adminEditAccount('ic', '${username}')" style="padding: 6px 10px; font-size: 10px;">EDIT</button>
            <button class="btn" onclick="adminDeleteIC('${username}')" style="padding: 6px 10px; font-size: 10px; color: var(--red); border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.1);">DEL</button>
          </div>
        </div>
      `).join('');
  } catch (err) {
    console.error('Error loading ICs:', err);
  }
}

async function adminLoadAdmins() {
  try {
    const snap = await db.ref('admins').once('value');
    const admins = snap.val() || {};
    const list = document.getElementById('admin-admins-list');

    if (Object.keys(admins).length === 0) {
      list.innerHTML = '<div style="text-align: center; color: var(--text3); padding: 20px;">No additional admin accounts</div>';
      return;
    }

    list.innerHTML = Object.entries(admins)
      .map(([username, data]) => `
        <div style="background: var(--bg3); border: 1px solid var(--border); padding: 12px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;">
          <div>
            <div style="font-weight: 700; color: var(--text);">${username}</div>
            <div style="font-size: 9px; color: var(--text3); margin-top: 2px;">Created: ${new Date(data.createdAt).toLocaleDateString()}</div>
          </div>
          <div style="display: flex; gap: 6px;">
            <button class="btn" onclick="adminEditAccount('admin', '${username}')" style="padding: 6px 10px; font-size: 10px;">EDIT</button>
            <button class="btn" onclick="adminDeleteAdmin('${username}')" style="padding: 6px 10px; font-size: 10px; color: var(--red); border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.1);">DEL</button>
          </div>
        </div>
      `).join('');
  } catch (err) {
    console.error('Error loading admins:', err);
  }
}

function adminEditAccount(type, username) {
  adminEditingAccount = username;
  adminEditingType = type;
  document.getElementById('edit-username').value = username;
  document.getElementById('edit-password').value = '';
  document.getElementById('edit-modal').style.display = 'flex';
}

function adminCloseModal() {
  document.getElementById('edit-modal').style.display = 'none';
  adminEditingAccount = null;
  adminEditingType = null;
}

async function adminSaveEdit() {
  const newUsername = document.getElementById('edit-username').value.trim();
  const newPassword = document.getElementById('edit-password').value.trim();

  if (!newUsername) {
    adminShowMessage('❌ Username cannot be empty', true);
    return;
  }

  if (newPassword && newPassword.length < 6) {
    adminShowMessage('❌ Password must be at least 6 characters', true);
    return;
  }

  try {
    const dbPath = adminEditingType === 'ic' ? 'ics' : 'admins';
    const oldUsername = adminEditingAccount;

    // If username changed, create new entry
    if (newUsername !== oldUsername) {
      const snap = await db.ref(dbPath + '/' + oldUsername).once('value');
      const data = snap.val();

      const updateData = {
        username: newUsername,
        password: newPassword || data.password,
        createdAt: data.createdAt
      };

      await db.ref(dbPath + '/' + newUsername).set(updateData);
      await db.ref(dbPath + '/' + oldUsername).remove();
    } else if (newPassword) {
      // Just update password
      await db.ref(dbPath + '/' + oldUsername).update({ password: newPassword });
    }

    adminShowMessage('✓ Account updated');
    adminCloseModal();
    if (adminEditingType === 'ic') adminLoadICs();
    if (adminEditingType === 'admin') adminLoadAdmins();
  } catch (err) {
    adminShowMessage('❌ Error: ' + err.message, true);
  }
}

async function adminDeleteIC(username) {
  if (!confirm('Delete IC account "' + username + '"?')) return;

  try {
    await db.ref('ics/' + username).remove();
    adminShowMessage('✓ Account deleted');
    adminLoadICs();
  } catch (err) {
    adminShowMessage('❌ Error: ' + err.message, true);
  }
}

async function adminDeleteAdmin(username) {
  if (!confirm('Delete admin account "' + username + '"?')) return;

  try {
    await db.ref('admins/' + username).remove();
    adminShowMessage('✓ Account deleted');
    adminLoadAdmins();
  } catch (err) {
    adminShowMessage('❌ Error: ' + err.message, true);
  }
}
</script>

</body>
</html>
