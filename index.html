<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPD Incident Tracker</title>
  
  <style>
    :root {
      --bg: #0b0e18;
      --bg2: #111827;
      --bg3: #1a2236;
      --bg4: #212940;
      --bg5: #283050;
      --text: #edf0fa;
      --text2: #9da8c4;
      --text3: #606880;
      --border: rgba(255,255,255,0.09);
      --border2: rgba(255,255,255,0.12);
      --accent: #2979e8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --cyan: #22d3ee;
      --gold: #c8a82a;
      --purple: #8b5cf6;
      --font: 'Courier New', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      overflow: hidden;
    }

    .screen {
      display: none;
      width: 100%;
      height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .screen.active {
      display: flex;
    }

    .login-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      max-width: 400px;
      width: 100%;
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo-icon {
      font-size: 60px;
      margin-bottom: 10px;
    }

    .logo-title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text);
    }

    .logo-subtitle {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 8px;
    }

    .form-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .form-group label {
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .form-group input {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 14px;
      border-radius: 6px;
      font-family: var(--font);
      font-size: 14px;
      transition: all 0.15s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--bg4);
    }

    .button-group {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 10px;
    }

    .btn {
      padding: 14px 20px;
      border: 1px solid var(--border2);
      background: var(--bg3);
      color: var(--text2);
      border-radius: 6px;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .btn:hover {
      background: var(--bg4);
      border-color: var(--accent);
      color: var(--text);
    }

    .btn.primary {
      background: rgba(41, 121, 232, 0.15);
      border-color: var(--accent);
      color: var(--accent);
      grid-column: 1 / -1;
      padding: 16px;
      font-size: 13px;
    }

    .btn.primary:hover {
      background: rgba(41, 121, 232, 0.25);
      color: #fff;
    }

    .error {
      color: var(--red);
      font-size: 12px;
      text-align: center;
      display: none;
    }

    .error.show {
      display: block;
    }
  </style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div class="screen active" id="screen-login">
  <div class="login-container">
    <div class="logo">
      <div class="logo-icon">🛡️</div>
      <div class="logo-title">INCIDENT<br>TRACKER</div>
      <div class="logo-subtitle">Shrewsbury Police Department</div>
    </div>

    <form onsubmit="handleLogin(event)" class="form-group" style="width: 100%;">
      <div>
        <label>Username</label>
        <input id="login-username" type="text" placeholder="Enter username" autocomplete="off">
      </div>

      <div>
        <label>Password</label>
        <input id="login-password" type="password" placeholder="Enter password" autocomplete="off">
      </div>

      <div class="error" id="login-error"></div>

      <div class="button-group">
        <button type="button" class="btn" onclick="loginAsAdmin()">Admin</button>
        <button type="button" class="btn" onclick="loginAsIC()">IC</button>
      </div>
    </form>

    <div style="font-size: 10px; color: var(--text3); margin-top: 20px; text-align: center;">
      v1.0 | Real-Time GPS Tracking
    </div>
  </div>
</div>

<!-- PLACEHOLDER SCREENS FOR LATER -->
<div class="screen" id="screen-admin">
  <div style="text-align: center;">
    <h1>Admin Screen</h1>
    <p>(Coming soon)</p>
    <button class="btn primary" onclick="logout()">Logout</button>
  </div>
</div>

<div class="screen" id="screen-ic">
  <div style="text-align: center;">
    <h1>IC Dashboard</h1>
    <p>(Coming soon)</p>
    <button class="btn primary" onclick="logout()">Logout</button>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyC-56rq9DEw2U0XJ37O8rujeO6O4zAphXE",
  authDomain: "shrewsbury-pd-track.firebaseapp.com",
  databaseURL: "https://shrewsbury-pd-track-default-rtdb.firebaseio.com",
  projectId: "shrewsbury-pd-track",
  storageBucket: "shrewsbury-pd-track.firebasestorage.app",
  messagingSenderId: "183303387326",
  appId: "1:183303387326:web:09b8659a1004aa42bbc6ef"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Global state
window.currentUser = null;
window.userRole = null; // 'admin' or 'ic'

// Show error message
function showError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// Login as Admin
async function loginAsAdmin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value.trim();

  if (!username || !password) {
    showError('Enter username and password');
    return;
  }

  // Check hardcoded admin
  if (username === 'admin' && password === '1234') {
    window.currentUser = username;
    window.userRole = 'admin';
    showScreen('screen-admin');
    return;
  }

  // Check Firebase admin accounts
  try {
    const snap = await db.ref('admins/' + username).once('value');
    const admin = snap.val();
    if (admin && admin.password === password) {
      window.currentUser = username;
      window.userRole = 'admin';
      showScreen('screen-admin');
      return;
    }
  } catch (err) {
    console.error('Firebase error:', err);
  }

  showError('Invalid credentials');
}

// Login as IC
async function loginAsIC() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value.trim();

  if (!username || !password) {
    showError('Enter username and password');
    return;
  }

  try {
    const snap = await db.ref('ics/' + username).once('value');
    const ic = snap.val();
    if (ic && ic.password === password) {
      window.currentUser = username;
      window.userRole = 'ic';
      showScreen('screen-ic');
      return;
    }
  } catch (err) {
    console.error('Firebase error:', err);
  }

  showError('Invalid credentials');
}

// Show/hide screens
function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const screen = document.getElementById(screenId);
  if (screen) screen.classList.add('active');
}

// Logout
function logout() {
  window.currentUser = null;
  window.userRole = null;
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
  showScreen('screen-login');
}

// Allow Enter key to submit
document.addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && window.currentUser === null) {
    const role = document.activeElement.closest('form') ? 'admin' : 'admin';
    if (role === 'admin') loginAsAdmin();
  }
});
</script>

</body>
</html>
