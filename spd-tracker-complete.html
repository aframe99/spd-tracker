<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPD Incident Tracker</title>
  
  <style>
    :root {
      --bg: #0b0e18;
      --bg2: #111827;
      --bg3: #1a2236;
      --bg4: #212940;
      --bg5: #283050;
      --text: #edf0fa;
      --text2: #9da8c4;
      --text3: #606880;
      --border: rgba(255,255,255,0.09);
      --border2: rgba(255,255,255,0.12);
      --accent: #2979e8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --cyan: #22d3ee;
      --gold: #c8a82a;
      --purple: #8b5cf6;
      --font: 'Courier New', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      overflow: hidden;
    }

    .screen {
      display: none;
      width: 100%;
      height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .screen.active {
      display: flex;
    }

    .login-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      max-width: 400px;
      width: 100%;
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo-icon {
      font-size: 60px;
      margin-bottom: 10px;
    }

    .logo-title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text);
    }

    .logo-subtitle {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 8px;
    }

    .form-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .form-group label {
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .form-group input {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 14px;
      border-radius: 6px;
      font-family: var(--font);
      font-size: 14px;
      transition: all 0.15s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--bg4);
    }

    .button-group {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 10px;
    }

    .btn {
      padding: 14px 20px;
      border: 1px solid var(--border2);
      background: var(--bg3);
      color: var(--text2);
      border-radius: 6px;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .btn:hover {
      background: var(--bg4);
      border-color: var(--accent);
      color: var(--text);
    }

    .btn.primary {
      background: rgba(41, 121, 232, 0.15);
      border-color: var(--accent);
      color: var(--accent);
      grid-column: 1 / -1;
      padding: 16px;
      font-size: 13px;
    }

    .btn.primary:hover {
      background: rgba(41, 121, 232, 0.25);
      color: #fff;
    }

    .error {
      color: var(--red);
      font-size: 12px;
      text-align: center;
      display: none;
    }

    .error.show {
      display: block;
    }
<!-- LEAFLET MAP -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<!-- LEAFLET TILE LAYERS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-providers/1.13.0/leaflet-providers.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-providers/1.13.0/leaflet-providers.min.js"></script>

<!-- QR CODE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<body>

<!-- LOGIN SCREEN -->
<div class="screen active" id="screen-login">
  <div class="login-container">
    <div class="logo">
      <div class="logo-icon">🛡️</div>
      <div class="logo-title">INCIDENT<br>TRACKER</div>
      <div class="logo-subtitle">Shrewsbury Police Department</div>
    </div>

    <form onsubmit="handleLogin(event)" class="form-group" style="width: 100%;">
      <div>
        <label>Username</label>
        <input id="login-username" type="text" placeholder="Enter username" autocomplete="off">
      </div>

      <div>
        <label>Password</label>
        <input id="login-password" type="password" placeholder="Enter password" autocomplete="off">
      </div>

      <div class="error" id="login-error"></div>

      <div class="button-group">
        <button type="button" class="btn" onclick="loginAsAdmin()">Admin</button>
        <button type="button" class="btn" onclick="loginAsIC()">IC</button>
      </div>
    </form>

    <div style="font-size: 10px; color: var(--text3); margin-top: 20px; text-align: center;">
      v1.0 | Real-Time GPS Tracking
    </div>
  </div>
</div>

<!-- PIN ENTRY SCREEN (QR PATH) -->
<div class="screen" id="screen-pin-entry">
  <div class="login-container">
    <div class="logo">
      <div class="logo-icon">🔐</div>
      <div class="logo-title">INCIDENT<br>ACCESS</div>
      <div class="logo-subtitle" id="pin-incident-id" style="margin-top: 12px; font-size: 13px;">Incident: --</div>
    </div>

    <div style="width: 100%; text-align: center; margin: 20px 0;">
      <div style="font-size: 12px; color: var(--text2); margin-bottom: 20px;">Enter the 4-digit PIN to access this incident</div>
      <input id="pin-input" type="text" placeholder="0000" maxlength="4" style="width: 100%; text-align: center; font-size: 32px; letter-spacing: 8px; padding: 20px; background: var(--bg3); border: 2px solid var(--border2); color: var(--text); border-radius: 6px; font-family: monospace;" autocomplete="off">
      <div class="error" id="pin-error" style="margin-top: 15px;"></div>
    </div>

    <button type="button" class="btn primary" onclick="verifyPin()">UNLOCK</button>

    <div style="font-size: 11px; color: var(--text3); margin-top: 20px; text-align: center;">
      <button type="button" class="btn" onclick="backToLogin()" style="width: 100%; margin-top: 10px;">Back to Login</button>
    </div>
  </div>
</div>

<!-- PREVIOUS LOGIN SCREEN -->
<div class="screen" id="screen-previous-login">
  <div class="login-container">
    <div class="logo">
      <div class="logo-icon">👤</div>
      <div class="logo-title">ACTIVE<br>LOGIN</div>
      <div class="logo-subtitle">Same Device Detected</div>
    </div>

    <div style="width: 100%; background: var(--bg3); border: 1px solid var(--border2); padding: 20px; border-radius: 6px; text-align: center;">
      <div style="margin-bottom: 15px;">
        <div style="font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">Currently logged in as:</div>
        <div style="font-size: 18px; font-weight: 700; color: var(--accent);" id="prev-login-name">--</div>
        <div style="font-size: 10px; color: var(--text3); margin-top: 4px;" id="prev-login-incident">--</div>
      </div>
    </div>

    <div class="button-group" style="margin-top: 20px;">
      <button type="button" class="btn primary" onclick="continueExistingLogin()" style="grid-column: 1 / -1;">Continue as This Person</button>
    </div>

    <div style="font-size: 11px; color: var(--text3); margin-top: 15px; text-align: center;">
      <button type="button" class="btn" onclick="startNewLogin()" style="width: 100%;">Check In As Someone Else</button>
    </div>
  </div>
</div>

<div class="screen" id="screen-officer-status">
  <div style="width: 100%; max-width: 500px; padding: 20px; text-align: center;">
    <div style="font-size: 28px; color: var(--green); margin-bottom: 15px;">✓</div>
    <div style="font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 8px;">CHECKED IN</div>
    <div style="font-size: 13px; color: var(--text2); margin-bottom: 30px;" id="officer-status-name">--</div>
    
    <div style="background: var(--bg3); border: 1px solid var(--border2); padding: 20px; border-radius: 6px; margin-bottom: 20px; text-align: left;">
      <div style="font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;">Officer Details</div>
      <div style="font-size: 12px; color: var(--text); line-height: 1.8;">
        <div><strong>Badge:</strong> <span id="status-badge">--</span></div>
        <div><strong>Agency:</strong> <span id="status-agency">--</span></div>
        <div><strong>Role:</strong> <span id="status-role">--</span></div>
        <div><strong>Department:</strong> <span id="status-department">--</span></div>
      </div>
    </div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px;">
      <button type="button" class="btn" onclick="editOfficerInfo()" style="width: 100%;">📝 UPDATE</button>
      <button type="button" class="btn" onclick="savePosition()" style="width: 100%;">📍 SAVE GPS</button>
    </div>
    
    <button type="button" class="btn primary" onclick="checkoutOfficer()" style="width: 100%; background: rgba(239, 68, 68, 0.15); border-color: var(--red); color: var(--red);">CHECK OUT</button>
  </div>
</div>

<div class="screen" id="screen-checkin">
  <div style="width: 100%; max-width: 500px; padding: 20px;">
    <!-- Header -->
    <div style="text-align: center; margin-bottom: 30px;">
      <div style="font-size: 24px; font-weight: 700; color: var(--text);">CHECK IN</div>
      <div style="font-size: 11px; color: var(--text3); margin-top: 6px; letter-spacing: 1px; text-transform: uppercase;" id="checkin-incident">--</div>
    </div>

    <!-- Form -->
    <form onsubmit="submitCheckin(event)" style="display: flex; flex-direction: column; gap: 15px;">
      
      <!-- Name Fields -->
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <div>
          <label style="font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 6px;">Last Name</label>
          <input id="ci-last" type="text" placeholder="Smith" required style="width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 12px; border-radius: 6px; font-family: var(--font); font-size: 13px;">
        </div>
        <div>
          <label style="font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 6px;">First Name</label>
          <input id="ci-first" type="text" placeholder="John" style="width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 12px; border-radius: 6px; font-family: var(--font); font-size: 13px;">
        </div>
      </div>

      <!-- Badge -->
      <div>
        <label style="font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 6px;">Badge / Unit #</label>
        <input id="ci-badge" type="text" placeholder="412" required style="width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 12px; border-radius: 6px; font-family: var(--font); font-size: 16px; letter-spacing: 2px; font-weight: 700;">
      </div>

      <!-- Agency Selector -->
      <div>
        <label style="font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 8px;">Agency</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
          <button type="button" class="agency-btn" data-agency="Police" onclick="selectAgency(this, 'Police')" style="padding: 12px; background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s;">🛡️ Police</button>
          <button type="button" class="agency-btn" data-agency="Fire" onclick="selectAgency(this, 'Fire')" style="padding: 12px; background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s;">🚒 Fire</button>
          <button type="button" class="agency-btn" data-agency="EMS" onclick="selectAgency(this, 'EMS')" style="padding: 12px; background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s;">⚕️ EMS</button>
        </div>
      </div>

      <!-- Roles (Dynamic) -->
      <div id="role-container" style="display: none;">
        <label style="font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 8px;">Role</label>
        <div id="role-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
        </div>
      </div>

      <!-- Department -->
      <div>
        <label style="font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 6px;">Department</label>
        <input id="ci-department" type="text" placeholder="e.g. Shrewsbury PD, Marlborough Fire" style="width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 12px; border-radius: 6px; font-family: var(--font); font-size: 13px;">
      </div>

      <!-- CHECK IN Button -->
      <button type="submit" class="btn primary" style="padding: 18px; font-size: 14px; margin-top: 10px;">CHECK IN</button>

      <!-- Expandable More Info -->
      <button type="button" class="btn" onclick="toggleMoreInfo()" style="width: 100%; margin-top: 8px; padding: 12px; font-size: 11px;">+ MORE INFORMATION</button>

      <div id="more-info-section" style="display: none; border-top: 1px solid var(--border2); padding-top: 15px; margin-top: 15px;">
        <div style="margin-bottom: 12px;">
          <label style="font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 6px;">Radio Channel</label>
          <input id="ci-radio" type="text" placeholder="CH1" style="width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 12px; border-radius: 6px; font-family: var(--font); font-size: 13px;">
        </div>

        <div style="margin-bottom: 12px;">
          <label style="font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 6px;">Cell Number</label>
          <input id="ci-phone" type="tel" placeholder="555-1234" style="width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 12px; border-radius: 6px; font-family: var(--font); font-size: 13px;">
        </div>

        <div style="margin-bottom: 12px;">
          <label style="font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 6px;">Vehicle / Equipment</label>
          <input id="ci-vehicle" type="text" placeholder="Unit 12" style="width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 12px; border-radius: 6px; font-family: var(--font); font-size: 13px;">
        </div>

        <div>
          <label style="font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 6px;">Notes</label>
          <textarea id="ci-notes" placeholder="Any additional info..." style="width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 12px; border-radius: 6px; font-family: var(--font); font-size: 13px; resize: none; height: 80px;"></textarea>
        </div>
      </div>

      <div class="error" id="checkin-error" style="margin-top: 10px;"></div>
    </form>
  </div>
</div>

<!-- PLACEHOLDER SCREENS FOR LATER -->
<div class="screen" id="screen-admin">
  <div style="width: 100%; max-width: 600px; padding: 20px;">
    <!-- Header -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
      <div>
        <div style="font-size: 24px; font-weight: 700; color: var(--text);">ADMIN</div>
        <div style="font-size: 11px; color: var(--text3); margin-top: 4px; letter-spacing: 1px; text-transform: uppercase;" id="admin-user">--</div>
      </div>
      <button type="button" class="btn" onclick="logout()" style="padding: 10px 16px; font-size: 11px;">LOGOUT</button>
    </div>

    <!-- Tabs -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px;">
      <button type="button" class="tab-btn active" onclick="showAdminTab('ics')" style="padding: 12px; background: rgba(41, 121, 232, 0.15); border: 1px solid var(--accent); color: var(--accent); border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer;">IC Accounts</button>
      <button type="button" class="tab-btn" onclick="showAdminTab('admins')" style="padding: 12px; background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer;">Admins</button>
    </div>

    <!-- IC ACCOUNTS TAB -->
    <div id="tab-ics" class="admin-tab" style="display: block;">
      <div style="background: var(--bg3); border: 1px solid var(--border2); padding: 15px; border-radius: 6px; margin-bottom: 20px;">
        <div style="font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;">Create New IC Account</div>
        
        <div style="margin-bottom: 12px;">
          <label style="font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 4px;">Username</label>
          <input id="new-ic-username" type="text" placeholder="e.g. jsmith" style="width: 100%; background: var(--bg2); border: 1px solid var(--border2); color: var(--text); padding: 10px; border-radius: 4px; font-family: var(--font); font-size: 12px;">
        </div>

        <div style="margin-bottom: 12px;">
          <label style="font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 4px;">Password</label>
          <input id="new-ic-password" type="password" placeholder="Min 6 characters" style="width: 100%; background: var(--bg2); border: 1px solid var(--border2); color: var(--text); padding: 10px; border-radius: 4px; font-family: var(--font); font-size: 12px;">
        </div>

        <button type="button" class="btn primary" onclick="createICAccount()" style="width: 100%; padding: 12px; font-size: 12px;">+ CREATE IC ACCOUNT</button>
      </div>

      <div style="font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;">IC Accounts</div>
      <div id="ics-list" style="display: flex; flex-direction: column; gap: 10px;">
        <div style="text-align: center; color: var(--text3); padding: 20px;">Loading accounts...</div>
      </div>
    </div>

    <!-- ADMINS TAB -->
    <div id="tab-admins" class="admin-tab" style="display: none;">
      <div style="background: var(--bg3); border: 1px solid var(--border2); padding: 15px; border-radius: 6px; margin-bottom: 20px;">
        <div style="font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;">Create New Admin Account</div>
        
        <div style="margin-bottom: 12px;">
          <label style="font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 4px;">Username</label>
          <input id="new-admin-username" type="text" placeholder="e.g. supervisor" style="width: 100%; background: var(--bg2); border: 1px solid var(--border2); color: var(--text); padding: 10px; border-radius: 4px; font-family: var(--font); font-size: 12px;">
        </div>

        <div style="margin-bottom: 12px;">
          <label style="font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 4px;">Password</label>
          <input id="new-admin-password" type="password" placeholder="Min 6 characters" style="width: 100%; background: var(--bg2); border: 1px solid var(--border2); color: var(--text); padding: 10px; border-radius: 4px; font-family: var(--font); font-size: 12px;">
        </div>

        <button type="button" class="btn primary" onclick="createAdminAccount()" style="width: 100%; padding: 12px; font-size: 12px;">+ CREATE ADMIN ACCOUNT</button>
      </div>

      <div style="font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;">Admin Accounts</div>
      <div id="admins-list" style="display: flex; flex-direction: column; gap: 10px;">
        <div style="text-align: center; color: var(--text3); padding: 20px;">Loading accounts...</div>
      </div>
    </div>

    <div class="error" id="admin-error" style="margin-top: 20px;"></div>
  </div>
</div>

<div class="screen" id="screen-ic">
  <div style="width: 100%; height: 100vh; display: grid; grid-template-columns: 300px 1fr 350px; gap: 0; background: var(--bg);">
    
    <!-- LEFT SIDEBAR - INCIDENTS & OFFICERS -->
    <div style="background: var(--bg2); border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column;">
      <!-- Header -->
      <div style="padding: 20px; border-bottom: 1px solid var(--border);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
          <div style="font-size: 16px; font-weight: 700; color: var(--text);">IC COMMAND</div>
          <button type="button" class="btn" onclick="logout()" style="padding: 6px 10px; font-size: 10px;">LOGOUT</button>
        </div>
        <select id="ic-incident-selector" onchange="switchIncident()" style="width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 10px; border-radius: 4px; font-family: var(--font); font-size: 12px;">
          <option value="">-- SELECT INCIDENT --</option>
        </select>
      </div>

      <!-- Create Incident Button -->
      <div style="padding: 15px; border-bottom: 1px solid var(--border);">
        <button type="button" class="btn primary" onclick="toggleCreateIncidentForm()" style="width: 100%; padding: 10px; font-size: 11px;">+ NEW INCIDENT</button>
      </div>

      <!-- Create Incident Form (Hidden) -->
      <div id="create-incident-form" style="display: none; padding: 15px; border-bottom: 1px solid var(--border); background: var(--bg3);">
        <div style="font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;">Create Incident</div>
        
        <div style="margin-bottom: 10px;">

// Check for QR code incident in URL

  const params = new URLSearchParams(window.location.search);

    document.getElementById('pin-incident-id').textContent = 'Incident: ' + incidentId;
    
    // Check for existing login on this device
    const existingLogin = localStorage.getItem('spd-current-officer');

      if (officer.incidentId === incidentId) {

// Verify PIN
async function verifyPin() {
  const pin = document.getElementById('pin-input').value.trim();
  const errorEl = document.getElementById('pin-error');
  
  if (!pin || pin.length !== 4) {
    errorEl.textContent = '❌ Enter 4-digit PIN';
    errorEl.classList.add('show');
    return;
  }

  try {
    const snap = await db.ref('incidents/' + window.currentIncident).once('value');
    const incident = snap.val();
    
    if (!incident) {
      errorEl.textContent = '❌ Incident not found';
      errorEl.classList.add('show');
      return;
    }

    if (incident.pin !== pin) {
      errorEl.textContent = '❌ Incorrect PIN';
      errorEl.classList.add('show');
      document.getElementById('pin-input').value = '';
      return;
    }

    // PIN correct - go to check-in screen
    localStorage.setItem('spd-incident-verified', JSON.stringify({
      incidentId: window.currentIncident,
      incidentName: incident.name,
      timestamp: Date.now()
    }));
    
    showScreen('screen-checkin');
    initCheckInForm();
  } catch (err) {
    console.error('Error verifying PIN:', err);
    errorEl.textContent = '❌ Connection error';
    errorEl.classList.add('show');
  }
}

    window.userRole = 'admin';
    document.getElementById('admin-user').textContent = 'Logged in as: ' + username;
    showScreen('screen-admin');
    loadICsList();

  }

  // Check Firebase admin accounts
  try {
    const snap = await db.ref('admins/' + username).once('value');

      window.currentUser = username;
      window.userRole = 'admin';

      showScreen('screen-admin');
      loadICsList();

    console.error('Firebase error:', err);
  }

  showError('Invalid credentials');
}

// Submit check-in
async function submitCheckin(event) {
  event.preventDefault();
  
  const last = document.getElementById('ci-last').value.trim();
  const first = document.getElementById('ci-first').value.trim();
  const badge = document.getElementById('ci-badge').value.trim();
  const department = document.getElementById('ci-department').value.trim();
  const errorEl = document.getElementById('checkin-error');
  
  if (!last) {
    errorEl.textContent = '❌ Enter last name';
    errorEl.classList.add('show');
    return;
  }
  
  if (!badge) {
    errorEl.textContent = '❌ Enter badge number';
    errorEl.classList.add('show');
    return;
  }
  
  if (!window.selectedAgency) {
    errorEl.textContent = '❌ Select agency';
    errorEl.classList.add('show');
    return;
  }
  
  if (!window.selectedRole) {
    errorEl.textContent = '❌ Select role';
    errorEl.classList.add('show');
    return;
  }

  const verified = JSON.parse(localStorage.getItem('spd-incident-verified'));
  const incidentId = verified.incidentId;
  
  // Create officer record
  const officerId = 'off-' + Date.now().toString(36);
  const officer = {
    id: officerId,
    lastName: last,
    firstName: first,
    badge: badge,
    agency: window.selectedAgency,
    role: window.selectedRole,
    department: department || 'Unknown',
    radio: document.getElementById('ci-radio').value.trim(),
    phone: document.getElementById('ci-phone').value.trim(),
    vehicle: document.getElementById('ci-vehicle').value.trim(),
    notes: document.getElementById('ci-notes').value.trim(),
    deviceId: window.deviceId,
    incidentId: incidentId,
    status: 'On Scene',
    checkinTime: new Date().toISOString(),
    lat: null,
    lng: null,
    accuracy: null
  };
  
  try {
    // Save to Firebase
    await db.ref('incidents/' + incidentId + '/officers/' + officerId).set(officer);
    
    // Save to local storage for quick reference
    localStorage.setItem('spd-current-officer', JSON.stringify(officer));
    
    window.currentOfficer = officer;
    window.userRole = 'officer';
    
    // Go to officer status screen
    showScreen('screen-officer-status');
    initOfficerStatus();
  } catch (err) {
    console.error('Check-in error:', err);
    errorEl.textContent = '❌ Check-in failed: ' + err.message;
    errorEl.classList.add('show');
  }
}

// Save GPS position
function savePosition() {
  if (!navigator.geolocation) {
    alert('GPS not available on this device');
    return;
  }
  
  navigator.geolocation.getCurrentPosition((pos) => {
    const officer = window.currentOfficer;
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const accuracy = pos.coords.accuracy;
    
    officer.lat = lat;
    officer.lng = lng;
    officer.accuracy = accuracy;
    
    // Update Firebase
    const verified = JSON.parse(localStorage.getItem('spd-incident-verified'));
    db.ref('incidents/' + verified.incidentId + '/officers/' + officer.id).update({
      lat: lat,
      lng: lng,
      accuracy: accuracy
    });
    
    localStorage.setItem('spd-current-officer', JSON.stringify(officer));
    alert('✓ Position saved');
  }, (err) => {
    alert('Unable to get location: ' + err.message);
  });
}

// Checkout officer
async function checkoutOfficer() {
  if (!confirm('Check out ' + window.currentOfficer.firstName + ' ' + window.currentOfficer.lastName + '?')) {
    return;
  }
  
  try {
    const officer = window.currentOfficer;
    const verified = JSON.parse(localStorage.getItem('spd-incident-verified'));
    
    // Remove from Firebase
    await db.ref('incidents/' + verified.incidentId + '/officers/' + officer.id).remove();
    
    // Clear local storage
    localStorage.removeItem('spd-current-officer');
    localStorage.removeItem('spd-incident-verified');
    
    window.currentOfficer = null;
    window.userRole = null;
    
    // Back to login
    showScreen('screen-login');
  } catch (err) {
    console.error('Checkout error:', err);
    alert('Checkout failed: ' + err.message);
  }
}

// IC Dashboard functions
let S = {
  map: null,
  currentIncident: null,
  incidents: {},
  officers: {},
  markers: {},
  mapLayer: 'street'
};

function generatePIN() {
  return Math.floor(Math.random() * 9000) + 1000;
}

// Initialize IC Dashboard
async function initICDashboard() {
  document.getElementById('ic-incident-selector').value = '';
  await loadIncidentsList();
  initMap();
}

// Initialize map
function initMap() {
  if (S.map) S.map.remove();
  S.map = L.map('ic-map').setView([42.3601, -71.0589], 12);
  setMapLayer('street');
}

// Set map layer
function setMapLayer(layer) {
  S.mapLayer = layer;
  
  if (S.map) {
    S.map.eachLayer((layer) => {
      if (layer instanceof L.TileLayer) S.map.removeLayer(layer);
    });
  }
  
  const layers = {
    'street': L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      maxZoom: 19
    }),
    'satellite': L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: '© Esri',
      maxZoom: 18
    }),
    'topo': L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenTopoMap',
      maxZoom: 17
    })
  };
  
  layers[layer].addTo(S.map);
  
  document.querySelectorAll('.map-layer-btn').forEach(btn => {
    btn.style.background = 'var(--bg2)';
    btn.style.borderColor = 'var(--border2)';
    btn.style.color = 'var(--text2)';
  });
  event.target.style.background = 'rgba(41, 121, 232, 0.15)';
  event.target.style.borderColor = 'var(--accent)';
  event.target.style.color = 'var(--accent)';
}

// Load incidents list
async function loadIncidentsList() {
  try {
    const snap = await db.ref('incidents').once('value');
    S.incidents = snap.val() || {};
    const selector = document.getElementById('ic-incident-selector');
    
    selector.innerHTML = '<option value="">-- SELECT INCIDENT --</option>';
    Object.entries(S.incidents).forEach(([id, inc]) => {
      if (inc.status !== 'closed') {
        const option = document.createElement('option');
        option.value = id;
        option.textContent = id + ' - ' + inc.name;
        selector.appendChild(option);
      }
    });
  } catch (err) {
    console.error('Error loading incidents:', err);
  }
}

// Switch incident
async function switchIncident() {
  const incId = document.getElementById('ic-incident-selector').value;
  if (!incId) {
    S.currentIncident = null;
    document.getElementById('event-details-form').style.display = 'none';
    clearOfficersList();
    return;
  }
  
  S.currentIncident = incId;
  document.getElementById('event-details-form').style.display = 'flex';
  
  // Load incident details
  const inc = S.incidents[incId];
  if (inc) {
    document.getElementById('event-id').value = incId;
    document.getElementById('event-type').value = inc.type || '';
    document.getElementById('event-location').value = inc.location || '';
    document.getElementById('event-oic').value = inc.oic || '';
    document.getElementById('event-command-post').value = inc.commandPost || '';
    document.getElementById('event-staging-area').value = inc.stagingArea || '';
    document.getElementById('event-radio-channel').value = inc.radioChannel || '';
    document.getElementById('event-notes').value = inc.notes || '';
    
    // Generate QR code
    generateQRCode(incId);
  }
  
  // Listen for officer updates
  listenToOfficers(incId);
}

// Listen to officers in real-time
function listenToOfficers(incId) {
  db.ref('incidents/' + incId + '/officers').on('value', (snap) => {
    S.officers = snap.val() || {};
    updateOfficersList();
    updateOfficersOnMap();
  });
}

// Update officers list
async function updateOfficersList() {
  const list = document.getElementById('officers-list');
  
  if (Object.keys(S.officers).length === 0) {
    list.innerHTML = '<div style="text-align: center; color: var(--text3); padding: 20px; font-size: 11px;">No officers checked in</div>';
    return;
  }
  
  list.innerHTML = Object.entries(S.officers)
    .map(([id, officer]) => `
      <div style="background: var(--bg3); border: 1px solid var(--border2); padding: 10px; border-radius: 4px; cursor: pointer; transition: all 0.15s;" onclick="selectOfficer('${id}')">
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
          <div style="flex: 1;">
            <div style="font-weight: 700; color: var(--text); font-size: 12px;">${officer.badge}</div>
            <div style="font-size: 10px; color: var(--text2);">${officer.firstName} ${officer.lastName}</div>
            <div style="font-size: 9px; color: var(--text3); margin-top: 2px;">${officer.agency} • ${officer.role}</div>
          </div>
          <div style="font-size: 11px; padding: 4px 8px; background: rgba(34, 197, 94, 0.15); color: var(--green); border-radius: 2px; white-space: nowrap;">${officer.status || 'On Scene'}</div>
        </div>
      </div>
    `).join('');
}

// Update officers on map
function updateOfficersOnMap() {
  // Clear old markers
  Object.values(S.markers).forEach(m => S.map.removeLayer(m));
  S.markers = {};
  
  // Add new markers
  Object.entries(S.officers).forEach(([id, officer]) => {
    if (!officer.lat || !officer.lng) return;
    
    const agencyIcons = {
      'Police': '🛡️',
      'Fire': '🚒',
      'EMS': '⚕️'
    };
    const icon = agencyIcons[officer.agency] || '📍';
    
    const html = `<div style="font-size: 28px; text-align: center;">
      ${icon}
      <div style="font-size: 9px; color: var(--text); font-weight: 700;">${officer.badge}</div>
    </div>`;
    
    const divIcon = L.divIcon({
      className: '',
      html: html,
      iconSize: [40, 50],
      iconAnchor: [20, 50]
    });
    
    const marker = L.marker([officer.lat, officer.lng], { icon: divIcon, zIndexOffset: 100 });
    marker.addTo(S.map);
    marker.bindPopup(`<strong>${officer.firstName} ${officer.lastName}</strong><br>Badge: ${officer.badge}<br>${officer.agency} - ${officer.role}`);
    S.markers[id] = marker;
  });
}

// Select officer
function selectOfficer(officerId) {
  const officer = S.officers[officerId];
  if (officer && officer.lat && officer.lng) {
    S.map.setView([officer.lat, officer.lng], 15);
    if (S.markers[officerId]) S.markers[officerId].openPopup();
  }
}

// Clear officers list
function clearOfficersList() {
  document.getElementById('officers-list').innerHTML = '<div style="text-align: center; color: var(--text3); padding: 20px; font-size: 11px;">No officers checked in</div>';
  Object.values(S.markers).forEach(m => S.map.removeLayer(m));
  S.markers = {};
}

// Show right tab
function showRightTab(tab) {
  document.querySelectorAll('.right-tab').forEach(t => t.style.display = 'none');
  document.querySelectorAll('.right-tab-btn').forEach(b => {
    b.style.background = 'var(--bg3)';
    b.style.borderColor = 'var(--border2)';
    b.style.color = 'var(--text2)';
  });
  
  document.getElementById('right-tab-' + tab).style.display = 'block';
  event.target.style.background = 'rgba(41, 121, 232, 0.15)';
  event.target.style.borderColor = 'var(--accent)';
  event.target.style.color = 'var(--accent)';
}

// Generate QR code
function generateQRCode(incId) {
  const container = document.getElementById('qr-code-display');
  container.innerHTML = '';
  
  const baseUrl = window.location.origin + window.location.pathname;
  const qrUrl = baseUrl + '?incident=' + incId;
  
  document.getElementById('qr-url').value = qrUrl;
  
  new QRCode(container, {
    text: qrUrl,
    width: 200,
    height: 200,
    colorDark: '#edf0fa',
    colorLight: '#0b0e18'
  });
}

// Copy QR URL
function copyQRUrl() {
  const url = document.getElementById('qr-url');
  url.select();
  document.execCommand('copy');
  alert('✓ Link copied to clipboard');
}

// Toggle create incident form
function toggleCreateIncidentForm() {
  const form = document.getElementById('create-incident-form');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

// Create new incident
async function createNewIncident() {
  const name = document.getElementById('new-inc-name').value.trim();
  const type = document.getElementById('new-inc-type').value;
  const location = document.getElementById('new-inc-location').value.trim();
  
  if (!name) {
    alert('❌ Enter incident name');
    return;
  }
  
  try {
    const year = new Date().getFullYear();
    let maxNum = 0;
    Object.keys(S.incidents).forEach(key => {
      const match = key.match(/^2026-(\d+)$/);
      if (match) {
        const num = parseInt(match[1], 10);
        if (num > maxNum) maxNum = num;
      }
    });
    
    const incId = year + '-' + (maxNum + 1);
    const pin = generatePIN();
    
    const incident = {
      id: incId,
      name: name,
      type: type,
      location: location,
      pin: pin.toString(),
      status: 'active',
      createdAt: new Date().toISOString(),
      officers: {}
    };
    
    await db.ref('incidents/' + incId).set(incident);
    
    alert('✓ Incident created: ' + incId + '\nPIN: ' + pin);
    
    document.getElementById('new-inc-name').value = '';
    document.getElementById('new-inc-location').value = '';
    toggleCreateIncidentForm();
    
    await loadIncidentsList();
  } catch (err) {
    alert('Error: ' + err.message);
  }
}

// Save event details
async function saveEventDetails() {
  if (!S.currentIncident) {
    alert('No incident selected');
    return;
  }
  
  try {
    await db.ref('incidents/' + S.currentIncident).update({
      type: document.getElementById('event-type').value,
      location: document.getElementById('event-location').value,
      oic: document.getElementById('event-oic').value,
      commandPost: document.getElementById('event-command-post').value,
      stagingArea: document.getElementById('event-staging-area').value,
      radioChannel: document.getElementById('event-radio-channel').value,
      notes: document.getElementById('event-notes').value
    });
    
    alert('✓ Event details saved');
  } catch (err) {
    alert('Error: ' + err.message);
  }
}

// Export incident log
async function exportIncidentLog() {
  if (!S.currentIncident) {
    alert('No incident selected');
    return;
  }
  
  const inc = S.incidents[S.currentIncident];
  const officers = S.officers;
  
  let log = `INCIDENT LOG\n`;
  log += `================\n`;
  log += `Incident ID: ${S.currentIncident}\n`;
  log += `Name: ${inc.name}\n`;
  log += `Type: ${inc.type}\n`;
  log += `Location: ${inc.location}\n`;
  log += `OIC: ${inc.oic || 'N/A'}\n`;
  log += `Command Post: ${inc.commandPost || 'N/A'}\n`;
  log += `Staging Area: ${inc.stagingArea || 'N/A'}\n`;
  log += `Radio Channel: ${inc.radioChannel || 'N/A'}\n`;
  log += `Notes: ${inc.notes || 'N/A'}\n\n`;
  
  log += `OFFICERS ON SCENE\n`;
  log += `================\n`;
  Object.entries(officers).forEach(([id, officer]) => {
    log += `${officer.badge} - ${officer.firstName} ${officer.lastName}\n`;
    log += `  Agency: ${officer.agency}\n`;
    log += `  Role: ${officer.role}\n`;
    log += `  Department: ${officer.department}\n`;
    log += `  Status: ${officer.status}\n`;
    log += `  Checked In: ${officer.checkinTime}\n\n`;
  });
  
  const element = document.createElement('a');
  element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(log));
  element.setAttribute('download', S.currentIncident + '_log.txt');
  element.style.display = 'none';
  document.body.appendChild(element);
  element.click();
  document.body.removeChild(element);
}

// Close incident
async function closeIncident() {
  if (!S.currentIncident) {
    alert('No incident selected');
    return;
  }
  
  if (!confirm('Close this incident? All officers will be checked out.')) {
    return;
  }
  
  try {
    // Check out all officers
    const officers = S.officers;
    Object.entries(officers).forEach(([id, officer]) => {
      db.ref('incidents/' + S.currentIncident + '/officers/' + id).remove();
    });
    
    // Mark incident as closed
    await db.ref('incidents/' + S.currentIncident).update({
      status: 'closed'
    });
    
    alert('✓ Incident closed');
    S.currentIncident = null;
    document.getElementById('ic-incident-selector').value = '';
    document.getElementById('event-details-form').style.display = 'none';
    clearOfficersList();
    await loadIncidentsList();
  } catch (err) {
    alert('Error: ' + err.message);
  }
}

function logout() {
  window.currentUser = null;
  window.userRole = null;
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
  showScreen('screen-login');
}

// Allow Enter key to submit
document.addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && window.currentUser === null) {
    const role = document.activeElement.closest('form') ? 'admin' : 'admin';
    if (role === 'admin') loginAsAdmin();
